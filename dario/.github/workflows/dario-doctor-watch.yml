name: dario doctor drift watch

# BUILDOUT-06. Runs `docker exec askalf-dario dario doctor` on a schedule and
# files one dedup'd issue when it surfaces a runtime drift no other watcher
# catches:
#   - OAuth not OK            -> bearer/refresh dead or expiring; dario 401s every
#                                non-Haiku call until re-authed (the recurring
#                                identity-drift time-sink).
#   - Template "live capture" -> the stale ~/.dario/cc-template.live.json shadow
#                                is masking the bundled template.
#   - Identity WARN           -> OAuth-bearer/userID mismatch (doctor detects this
#                                in pool mode; single-account shows INFO).
#
# Must run on the self-hosted dario-drift runner (same host as the askalf-dario
# container) so `docker exec` reaches it — contrast sdk-drift-watch, which is
# metadata-only on ubuntu-latest. Detection only; mirrors that watch's
# open/refresh-one-issue + auto-close-on-clean + crash-vs-drift contract.

on:
  schedule:
    - cron: '37 */6 * * *'   # every 6h at :37, offset from the other watchers
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: dario-doctor-watch
  cancel-in-progress: false

jobs:
  doctor-drift-check:
    runs-on: [self-hosted, dario-drift]
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: askalf/checkout-with-retry@744195501c3e2b794c50370b753a7b8c93d084f5  # v1.0.0

      - name: Run dario doctor drift check
        id: check
        run: |
          set +e
          node scripts/check-doctor-drift.mjs > doctor-drift.json 2> doctor-drift.err
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 0 ]; then
            echo "dario doctor clean — OAuth OK, no template shadow, identity not WARN."
            cat doctor-drift.json
            exit 0
          fi
          if [ "$code" -eq 1 ]; then
            echo "dario doctor DRIFT detected:"
            cat doctor-drift.json
            exit 0   # real drift is handled by the issue step below, not a job failure
          fi
          # Any other exit (3): doctor couldn't run / output unparseable -> infra
          # or format error. Surface red rather than as a false drift issue.
          echo "::error::check-doctor-drift.mjs could not run dario doctor (exit $code) — infra/format error, not drift."
          cat doctor-drift.err
          exit "$code"

      - name: Open / refresh dario-doctor-drift issue
        if: steps.check.outputs.exit_code == '1'
        run: |
          set -eo pipefail

          # Self-bootstrap the label so a fresh repo doesn't fail on create.
          gh label create dario-doctor-drift \
            --color D93F0B \
            --description "dario doctor surfaced OAuth / template-shadow / identity drift (dario-doctor-watch.yml)" \
            --force -R "$GITHUB_REPOSITORY" || true

          body_file=$(mktemp)
          {
            echo "## dario doctor drift detected"
            echo ""
            echo "Generated by \`.github/workflows/dario-doctor-watch.yml\` on $(date -Iseconds)."
            echo ""
            echo "\`scripts/check-doctor-drift.mjs\` parsed \`docker exec askalf-dario dario doctor\` and found drift the other watchers don't cover:"
            echo ""
            echo '```json'
            cat doctor-drift.json
            echo '```'
            echo ""
            echo "**OAuth** drift = the deployed bearer/refresh is dead or expiring; dario 401s every non-Haiku call until re-authed. **Template \"live capture\"** = the stale \`~/.dario/cc-template.live.json\` is shadowing the bundled template. **Identity WARN** = bearer/userID mismatch. Fix the live proxy (re-auth / clear the live-cache); this auto-closes on the next clean run."
          } > "$body_file"

          existing=$(gh issue list -R "$GITHUB_REPOSITORY" --label dario-doctor-drift --state open --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" -R "$GITHUB_REPOSITORY" --body-file "$body_file"
            gh issue comment "$existing" -R "$GITHUB_REPOSITORY" \
              --body "Still drifting as of $(date -Iseconds) ([run](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID))."
            echo "refreshed existing issue #$existing"
          else
            gh issue create -R "$GITHUB_REPOSITORY" \
              --title "dario doctor drift detected" \
              --label dario-doctor-drift \
              --body-file "$body_file"
          fi

      - name: Auto-close dario-doctor-drift issue on clean run
        if: steps.check.outputs.exit_code == '0'
        run: |
          set -eo pipefail
          open_issues=$(gh issue list -R "$GITHUB_REPOSITORY" --label dario-doctor-drift --state open --json number --jq '.[].number')
          for n in $open_issues; do
            gh issue close "$n" -R "$GITHUB_REPOSITORY" \
              --comment "Auto-closed: dario doctor clean (OAuth OK, no template shadow, identity not WARN) on [run](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)."
          done
